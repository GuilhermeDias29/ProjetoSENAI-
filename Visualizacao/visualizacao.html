<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vagas</title>
    <link rel="stylesheet" href="visualizacao.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="barra-de-topo">
        <header class="header"><a href="#" class="logo"><img src="imagens/logo.png"></a></header>
    </div>

    <div class="container">
        <div class="content-wrapper">
            
            <div class="top-section">
                <h2>Encontre a sua Vaga</h2>
                
                <div class="search-wrapper">
                    <div class="search-bar">
                        <i class="bi bi-search"></i>
                        <input type="text" id="search-input" placeholder="Pesquisar vaga (Ex: Adm, TI...)">
                        <div class="filter-btn">
                            <i class="bi bi-sliders"></i>
                        </div>
                    </div>

                    <div class="tags-container">
                        <button class="tag active" data-cat="todas">Todas</button>
                        <button class="tag" data-cat="Adm">Adm</button>
                        <button class="tag" data-cat="Mec">Mecânica</button>
                        <button class="tag" data-cat="TI">TI</button>
                    </div>
                </div>
            </div>

            <div class="pending-activities">
                <div class="activities-grid"></div>
            </div>

        </div>
    </div>

    <script>
    $(document).ready(function() {
        const tipoUsuario = localStorage.getItem('tipoUsuario');
        let filtroCategoria = 'todas';

        function carregarVagas() {
            $.get('http://localhost:3000/vagas', function(vagas) {
                const container = $('.activities-grid');
                container.empty();

                if(vagas.length === 0) {
                    container.append('<p style="width:100%; text-align:left;">Nenhuma vaga disponível.</p>');
                    return;
                }

                vagas.forEach(vaga => {
                    let botaoExcluir = '';
                    if (tipoUsuario === 'admin') {
                        botaoExcluir = `<button class="btn-excluir" data-id="${vaga.id}" style="background:red; color:white; border:none; padding:5px; margin-top:5px; cursor:pointer; border-radius:5px;">🗑️</button>`;
                    }

                    const cardHtml = `
                        <div class="activity-card" id="card-${vaga.id}" data-categoria="${vaga.categoria}" data-titulo="${vaga.titulo.toLowerCase()}" data-empresa="${vaga.empresa.toLowerCase()}">
                            <h3>${vaga.titulo}</h3>
                            <p><strong>${vaga.empresa}</strong></p>
                            
                            <button class="btn-visualizar" onclick="window.location.href='../Visualizacao/Detalhes/descricao.html?id=${vaga.id}'">
                                Visualizar
                            </button>
                            <br>
                            ${botaoExcluir}
                        </div>
                    `;
                    container.append(cardHtml);
                });
            });
        }

        $('#search-input').on('input', function() { filtrarTudo(); });

        $('.tag').click(function() {
            $('.tag').removeClass('active');
            $(this).addClass('active');
            filtroCategoria = $(this).data('cat');
            filtrarTudo();
        });

        function filtrarTudo() {
            const termo = $('#search-input').val().toLowerCase();
            $('.activity-card').each(function() {
                const card = $(this);
                const titulo = card.data('titulo');
                const empresa = card.data('empresa');
                const catCard = card.data('categoria');
                const textoOk = titulo.includes(termo) || empresa.includes(termo);
                const catOk = (filtroCategoria === 'todas') || (catCard === filtroCategoria);

                if (textoOk && catOk) card.fadeIn();
                else card.hide();
            });
        }

        $(document).on('click', '.btn-excluir', function() {
            const idVaga = $(this).data('id');
            if(confirm("Apagar vaga?")) {
                $.ajax({
                    url: `http://localhost:3000/vagas/${idVaga}`,
                    type: 'DELETE',
                    success: function() { $(`#card-${idVaga}`).fadeOut(); }
                });
            }
        });

        carregarVagas();
    });
    </script>
</body>
</html>
